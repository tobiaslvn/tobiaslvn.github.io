<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing — Tobias Levin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='50' y1='15' x2='50' y2='85' stroke='black' stroke-width='12' stroke-linecap='round'/><line x1='15' y1='50' x2='85' y2='50' stroke='black' stroke-width='12' stroke-linecap='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fff;
            color: #101820;
            min-height: 100vh;
            padding: 60px;
            display: flex;
            justify-content: center;
        }
        #main-content { width: 100%; max-width: 560px; }
        @keyframes fade-in { to { opacity: 1; } }
        .word { display: inline; opacity: 0; animation: fade-in 0.45s ease forwards; }
        .fade-block { opacity: 0; animation: fade-in 0.45s ease forwards; }
        a { color: inherit; text-decoration: none; }
        #back { font-size: 24px; color: #d9d9d6; margin-bottom: 48px; display: block; }
        #back:hover { color: #101820; }
        h1 { font-size: 16px; font-weight: 400; margin-bottom: 8px; }
        .date { font-size: 16px; color: #d9d9d6; margin-bottom: 48px; }
        .body { font-size: 16px; line-height: 1.7; }
        .body p { margin-bottom: 1.2em; }
        .body h1, .body h2, .body h3 { font-weight: 500; margin-bottom: 0.6em; margin-top: 1.6em; }
        .body figure { margin-bottom: 1.2em; background: #f5f5f3; border-radius: 6px; }
        .body figure img { width: 100%; border-radius: 6px; display: block; margin-bottom: 0; }
        .body figcaption { font-size: 13px; color: #a0a09e; margin-top: 6px; }
        .body blockquote { border-left: 2px solid #d9d9d6; padding-left: 1em; color: #888; margin-bottom: 1.2em; }
        .body hr { border: none; border-top: 1px solid #f0f0ee; margin: 1.6em 0; }
        .body li { margin-left: 1.4em; margin-bottom: 0.4em; }
        .body a { text-decoration: underline; }
        .body p:last-child { margin-bottom: 0; }
        .photos { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
        .photos img { width: 100%; border-radius: 6px; display: block; }
        @media (max-width: 768px) { body { padding: 30px; } }
    </style>
</head>
<body>
    <div id="main-content">
        <a href="/writing/" id="back">&#8249;</a>
        <div id="entry-body"></div>
    </div>
    <script>
        var id = new URLSearchParams(location.search).get('id');
        var bodyEl = document.getElementById('entry-body');
        var delay = 0;
        var step = 38;
        var MAX_DELAY = 1400;

        function nd() {
            var d = Math.min(delay, MAX_DELAY);
            delay += step;
            return d;
        }

        function wrapWords(el) {
            var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
                acceptNode: function(node) {
                    return node.parentElement.closest('figure')
                        ? NodeFilter.FILTER_REJECT
                        : NodeFilter.FILTER_ACCEPT;
                }
            });
            var nodes = [];
            var n;
            while ((n = walker.nextNode())) nodes.push(n);
            nodes.forEach(function(textNode) {
                var frag = document.createDocumentFragment();
                textNode.textContent.split(/(\s+)/).forEach(function(part) {
                    if (!part) return;
                    if (/^\s+$/.test(part)) {
                        frag.appendChild(document.createTextNode(part));
                    } else {
                        var span = document.createElement('span');
                        span.className = 'word';
                        span.style.animationDelay = nd() + 'ms';
                        span.textContent = part;
                        frag.appendChild(span);
                    }
                });
                textNode.parentNode.replaceChild(frag, textNode);
            });
            el.querySelectorAll('figure').forEach(function(fig) {
                fig.classList.add('fade-block');
                fig.style.animationDelay = nd() + 'ms';
                delay += step * 2;
            });
        }

        fetch('/api/entries?id=' + encodeURIComponent(id)).then(function(r) { return r.json(); }).then(function(entry) {
            document.title = entry.title + ' — Tobias Levin';

            var h1 = document.createElement('h1');
            var dateEl = document.createElement('div');
            dateEl.className = 'date';
            var contentEl = document.createElement('div');
            contentEl.className = 'body';
            contentEl.innerHTML = entry.html || '';

            bodyEl.innerHTML = '';
            bodyEl.appendChild(h1);
            bodyEl.appendChild(dateEl);
            bodyEl.appendChild(contentEl);

            // Animate title words
            entry.title.split(/\s+/).forEach(function(word, i, arr) {
                if (i > 0) h1.appendChild(document.createTextNode(' '));
                var span = document.createElement('span');
                span.className = 'word';
                span.style.animationDelay = nd() + 'ms';
                span.textContent = word;
                h1.appendChild(span);
            });

            // Animate date as one unit
            dateEl.classList.add('fade-block');
            dateEl.style.animationDelay = nd() + 'ms';
            dateEl.textContent = entry.date;

            // Animate body word by word
            wrapWords(contentEl);
        }).catch(function() {
            bodyEl.innerHTML = '<p style="color:#d9d9d6">Entry not found.</p>';
        });
    </script>
</body>
</html>
