<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Levin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='50' y1='0' x2='50' y2='100' stroke='black' stroke-width='1'/><line x1='0' y1='50' x2='100' y2='50' stroke='black' stroke-width='1'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fff;
            color: #0b0b0b;
            min-height: 100vh;
            padding: 60px;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        @keyframes fade-in-grey {
            to { opacity: 0.4; }
        }

        .word {
            display: inline;
            opacity: 0;
            animation: fade-in 0.45s ease forwards;
        }

        .word.grey {
            animation: fade-in-grey 0.45s ease forwards;
        }

#name-line {
            display: block;
            font-weight: 400;
            font-size: 24px;
            margin-bottom: 6px;
            white-space: nowrap;
        }

        #subtitle {
            display: block;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #location {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
            color: #999;
            position: fixed;
            bottom: 60px;
            left: 60px;
            opacity: 0;
            animation: fade-in 0.45s ease forwards;
            animation-delay: 1800ms;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            animation: live-pulse 2s ease-out infinite;
        }

        @keyframes live-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
            70%  { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #prose-container {
            font-size: 24px;
            line-height: 1.6;
        }

        #prose-container p {
            margin-bottom: 1em;
        }

        #prose-container p:last-child {
            margin-bottom: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Tooltip stack */
        #tooltip-stack {
            margin-top: 3em;
            position: relative;
        }

        .tooltip-item {
            position: absolute;
            left: 0;
            max-width: calc(100vw - 120px);
            font-size: 24px;
            line-height: 2;
            opacity: 0;
            animation: tooltip-pop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tooltip-item-inner {
            display: inline;
            background: #f5f5f5;
            color: #0b0b0b;
            border-radius: 5px;
            padding: 10px 16px;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        @keyframes tooltip-pop {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .word-clickable {
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 2px;
            cursor: pointer;
        }



        @keyframes tooltip-fade-out {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-10px); }
        }

        .tooltip-item.fade-out {
            animation: tooltip-fade-out 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        [data-swap] {
            cursor: pointer;
            background: linear-gradient(rgba(220, 220, 220, 0.6), rgba(220, 220, 220, 0.6)) no-repeat left 72%;
            background-size: 0% 1.1em;
            border-radius: 2px;
            padding-right: 3px;
            margin-right: -3px;
            animation: highlight-sweep 0.4s ease forwards !important;
        }

        @keyframes highlight-sweep {
            to { background-size: 100% 1.1em; }
        }

        .typing { position: relative; }
        .typing::after {
            content: '|';
            position: absolute;
            left: 100%;
            animation: blink 0.6s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .tooltip-count {
            display: inline-block;
            vertical-align: super;
            font-size: 10px;
            line-height: 1;
            color: #aaa;
            margin-left: 1px;
            opacity: 0;
            transform: scale(2) translateY(-2px);
            animation: tooltip-count-pop 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes tooltip-count-pop {
            0%   { opacity: 0; transform: scale(2) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .tooltip-word {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: solid;
            text-underline-offset: 4px;
            text-decoration-thickness: 2px;
        }

@media (max-width: 768px) {
            body { padding: 30px; }
            #name-line { margin-bottom: 4px; }
            #subtitle { margin-bottom: 6px; }
            #prose-container { margin-top: 48px; }
            #location { bottom: 30px; left: 30px; }
            .tooltip-item {
                max-width: calc(100vw - 60px);
                font-size: 20px;
                line-height: 1.55;
            }
            .tooltip-item-inner {
                padding: 2px 5px;
            }
        }
    </style>
</head>
<body>

    <div id="name-line"></div>
    <div id="subtitle"></div>
    <div id="location">
        <span class="live-dot"></span>
        <span>Copenhagen</span>
        <span id="location-time" style="margin-left:4px;"></span>
    </div>
    <div id="prose-container"></div>
    <div id="tooltip-stack"></div>
    <div id="agentation-root"></div>
    <script type="module" src="/src/agentation-widget.jsx"></script>

    <script>
        var emailHref = 'mai' + 'lto:' + 'more' + '@' + 'tobiaslevin.com';

        var nameWords = ['Tobias', 'Levin'];

        var subtitleWords = ['Living', 'in', 'Copenhagen,', 'but', 'often', 'travelling.'];

        var paragraphs = [
            [
                { text: "I'm" },
                { text: 'a' },
                { text: 'generalist designer', swap: 'jack of all trades' },
                { text: ',', noSpace: true },
                { text: 'focused' },
                { text: 'on' },
                { text: 'details', swap: 'tactility', swap2: 'clarity' },
                { text: '.', noSpace: true },
            ],
            [
                { text: 'I' },
                { text: 'co-founded', tooltipPart: 'co', remainder: '-founded', tooltip: '2017~ Nikolaj Honoré and I founded Anyone, later joined by Noel Heath.', tooltip2: '2023~ I continued it solo.' },
                { text: 'Anyone,', href: 'https://anyoneworldwide.com', tooltip: 'We work with artists, brands, and designers redefining what playing cards can be.', tooltip2: "We've expanded into leather accessories and home goods.", tooltip3: 'We host pop-ups around the world.' },
                { text: 'a' },
                { text: 'playing' },
                { text: 'card' },
                { text: 'brand' },
                { text: 'built' },
                { text: 'around' },
                { text: 'cardistry.', tooltip: 'Think card shuffles on peptides.', tooltip2: 'Springs, cuts, fans, chin-extensions.' },
            ],
            [
                { text: 'I' },
                { text: 'studied', tooltip: 'At SAFD.', tooltipClickWord: 'SAFD.', tooltipExpanded: 'Scandinavian Academy of Fashion Design.' },
                { text: 'fashion,' },
                { text: "now" },
                { text: 'working' },
                { text: 'on' },
                { text: 'namesake', shake: true },
                { text: 'label.' },
            ],
            [
                { text: 'Email', href: emailHref, grey: true },
                { text: '\u00a0\u00a0\u00a0', grey: true },
                { text: 'Instagram', href: 'https://instagram.com/tobiaslvn', grey: true },
            ],
        ];

        var TOOLTIP_COLORS = ['#f5f5f5', '#f5f5f5', '#f5f5f5', '#f5f5f5'];
        var tooltipColorIdx = 0;

        var delay = 0;
        var step = 40;

        function makeWord(text, grey, extraClass) {
            var span = document.createElement('span');
            span.className = 'word' + (grey ? ' grey' : '') + (extraClass ? ' ' + extraClass : '');
            span.style.animationDelay = delay + 'ms';
            delay += step;
            span.textContent = text;
            return span;
        }

        // Name
        var nameLine = document.getElementById('name-line');
        var nameSpans = [];
        nameWords.forEach(function(word, i) {
            var sp = makeWord(word + (i < nameWords.length - 1 ? '\u00a0' : ''), false);
            nameSpans.push(sp);
            nameLine.appendChild(sp);
        });
        var nameIsUpper = false;

        var swapSpans = [];

        // Subtitle (grey)
        var subtitleEl = document.getElementById('subtitle');
        subtitleWords.forEach(function(word, i) {
            var span = makeWord(word, true);
            if (word === 'travelling.') {
                span._swapQueue = ['in Tokyo.'];
                span.addEventListener('animationend', function() {
                    this._fadeInDone = true;
                    if (this._activateHighlight) this._activateHighlight();
                }, { once: true });
                swapSpans.push(span);
            }
            subtitleEl.appendChild(span);
            if (i < subtitleWords.length - 1) subtitleEl.appendChild(document.createTextNode(' '));
        });

        // Prose paragraphs
        var container = document.getElementById('prose-container');
        paragraphs.forEach(function(tokens) {
            var p = document.createElement('p');
            tokens.forEach(function(token, i) {
                var span = document.createElement('span');
                span.className = 'word' + (token.grey ? ' grey' : '');
                span.style.animationDelay = delay + 'ms';
                delay += step;

                if (token.tooltipPart) {
                    var inner = document.createElement('span');
                    inner.dataset.tooltip = token.tooltip;
                    if (token.tooltip2) inner.dataset.tooltip2 = token.tooltip2;
                    inner.classList.add('tooltip-word');
                    inner.textContent = token.tooltipPart;
                    var tipColor = TOOLTIP_COLORS[tooltipColorIdx++ % TOOLTIP_COLORS.length];
                    inner._tooltipColor = tipColor;
                    var ctr = document.createElement('span');
                    ctr.className = 'tooltip-count';
                    ctr.style.animationDelay = (parseFloat(span.style.animationDelay) + 600) + 'ms';
                    var total = 1 + (token.tooltip2 ? 1 : 0);
                    ctr.textContent = total;
                    ctr.dataset.total = total;
                    inner.appendChild(ctr);
                    inner._tooltipCounter = ctr;
                    span.appendChild(inner);
                    span.appendChild(document.createTextNode(token.remainder));
                } else if (token.tooltip) {
                    span.dataset.tooltip = token.tooltip;
                    if (token.tooltip2) span.dataset.tooltip2 = token.tooltip2;
                    if (token.tooltip3) span.dataset.tooltip3 = token.tooltip3;
                    if (token.tooltipClickWord) span._tooltipClickWord = token.tooltipClickWord;
                    if (token.tooltipExpanded) span._tooltipExpanded = token.tooltipExpanded;
                    span.classList.add('tooltip-word');
                    span.textContent = token.text;
                    var tipColor = TOOLTIP_COLORS[tooltipColorIdx++ % TOOLTIP_COLORS.length];
                    span._tooltipColor = tipColor;
                    var ctr = document.createElement('span');
                    ctr.className = 'tooltip-count';
                    ctr.style.animationDelay = (parseFloat(span.style.animationDelay) + 600) + 'ms';
                    var total = 1 + (token.tooltip2 ? 1 : 0) + (token.tooltip3 ? 1 : 0);
                    ctr.textContent = total;
                    ctr.dataset.total = total;
                    span.appendChild(ctr);
                    span._tooltipCounter = ctr;
                } else if (token.swap) {
                    span.textContent = token.text;
                    span._swapQueue = [token.swap];
                    if (token.swap2) span._swapQueue.push(token.swap2);
                    span.addEventListener('animationend', function() {
                        this.style.opacity = '1';
                        this._fadeInDone = true;
                        if (this._activateHighlight) this._activateHighlight();
                    }, { once: true });
                    swapSpans.push(span);
                } else if (token.href) {
                    var a = document.createElement('a');
                    a.href = token.href;
                    if (token.href.indexOf('mailto') === -1) a.target = '_blank';
                    a.textContent = token.text;
                    span.appendChild(a);
                } else if (token.shake) {
                    span.textContent = token.text;
                    span.dataset.shake = 'true';
                } else {
                    span.textContent = token.text;
                }

                p.appendChild(span);
                if (i < tokens.length - 1 && !tokens[i + 1].noSpace) p.appendChild(document.createTextNode(' '));
            });
            container.appendChild(p);
        });

        // Chained highlight sweeps for swap words
        function activateSwapHighlight(span) {
            if (span.classList.contains('grey')) span.style.opacity = '0.4';
            span.dataset.swap = span._highlightOnly ? '' : span._swapQueue[0];
            span.addEventListener('animationend', function() {
                var next = swapSpans[swapSpans.indexOf(span) + 1];
                if (next) {
                    if (next._fadeInDone) { activateSwapHighlight(next); }
                    else { next._activateHighlight = function() { activateSwapHighlight(next); }; }
                }
            }, { once: true });
        }
        if (swapSpans[0]) {
            if (swapSpans[0]._fadeInDone) { activateSwapHighlight(swapSpans[0]); }
            else { swapSpans[0]._activateHighlight = function() { activateSwapHighlight(swapSpans[0]); }; }
        }

        // Tooltip stack
        var tooltipStack = document.getElementById('tooltip-stack');
        var clickCounts = new Map();
        var activePillCount = 0;
        var nextSlotTop = 0;
        var PILL_GAP = 8;

        var typeTimer = null;
        function typeEffect(el, target, onComplete) {
            if (typeTimer) clearTimeout(typeTimer);
            var current = el.textContent;
            var deleteSteps = [];
            for (var i = current.length - 1; i >= 0; i--) deleteSteps.push(current.slice(0, i));
            var typeSteps = [];
            for (var j = 1; j <= target.length; j++) typeSteps.push(target.slice(0, j));
            el.classList.add('typing');
            var stepIndex = 0;
            function next() {
                if (stepIndex < deleteSteps.length) {
                    el.textContent = deleteSteps[stepIndex++];
                    typeTimer = setTimeout(next, 50);
                } else if (stepIndex === deleteSteps.length) {
                    stepIndex++;
                    typeTimer = setTimeout(next, 180);
                } else {
                    var typeIndex = stepIndex - deleteSteps.length - 1;
                    if (typeIndex < typeSteps.length) {
                        el.textContent = typeSteps[typeIndex];
                        stepIndex++;
                        typeTimer = setTimeout(next, 50);
                    } else {
                        el.classList.remove('typing');
                        if (onComplete) onComplete();
                    }
                }
            }
            next();
        }

        document.addEventListener('click', function(e) {
            var tooltipTarget = e.target.closest('[data-tooltip]');
            if (tooltipTarget) {
                e.preventDefault();
                var count = clickCounts.get(tooltipTarget) || 0;
                var total = 1 + (tooltipTarget.dataset.tooltip2 ? 1 : 0) + (tooltipTarget.dataset.tooltip3 ? 1 : 0);
                var idx = count % total;
                var text = idx === 0 ? tooltipTarget.dataset.tooltip
                         : idx === 1 ? tooltipTarget.dataset.tooltip2
                         : tooltipTarget.dataset.tooltip3;
                var newCount = count + 1;
                clickCounts.set(tooltipTarget, newCount);
                if (tooltipTarget._tooltipCounter) {
                    var remaining = total - (newCount % total);
                    tooltipTarget._tooltipCounter.textContent = remaining;
                }

                // Cancel and fade out any existing pills
                var hadExisting = tooltipStack.querySelectorAll('.tooltip-item').length > 0;
                tooltipStack.querySelectorAll('.tooltip-item').forEach(function(p) {
                    p._cancelled = true;
                    p.classList.add('fade-out');
                });
                activePillCount = 0;
                nextSlotTop = 0;

                var delay = hadExisting ? 400 : 0;
                setTimeout(function() {
                    tooltipStack.innerHTML = '';
                    activePillCount++;
                    var item = document.createElement('div');
                    item.className = 'tooltip-item';
                    item.style.top = '0px';
                    var inner = document.createElement('span');
                    inner.className = 'tooltip-item-inner';
                    if (tooltipTarget._tooltipClickWord && text.includes(tooltipTarget._tooltipClickWord)) {
                        var parts = text.split(tooltipTarget._tooltipClickWord);
                        inner.appendChild(document.createTextNode(parts[0]));
                        var expandBtn = document.createElement('span');
                        expandBtn.textContent = tooltipTarget._tooltipClickWord;
                        expandBtn.style.cssText = 'cursor:pointer;border-radius:2px;padding:0 3px;margin:0 -1px;background:linear-gradient(rgba(180,180,180,0.5),rgba(180,180,180,0.5)) no-repeat left 72%;background-size:0% 1.1em;animation:highlight-sweep 0.4s ease forwards;animation-delay:500ms;';
                        expandBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            expandBtn.style.background = 'none';
                            typeEffect(expandBtn, tooltipTarget._tooltipExpanded);
                        });
                        inner.appendChild(expandBtn);
                        if (parts[1]) inner.appendChild(document.createTextNode(parts[1]));
                    } else {
                        inner.textContent = text;
                    }
                    var cardColor = tooltipTarget._tooltipColor;
                    if (cardColor) {
                        inner.style.background = cardColor;
                        var brightness = parseInt(cardColor.slice(1,3),16);
                        inner.style.color = brightness > 150 ? '#0b0b0b' : '#fff';
                    }
                    item.appendChild(inner);
                    tooltipStack.appendChild(item);

                    requestAnimationFrame(function() {
                        nextSlotTop = item.offsetHeight;
                        tooltipStack.style.height = nextSlotTop + 'px';
                    });

                    var wordCount = (tooltipTarget._tooltipExpanded ? 'At ' + tooltipTarget._tooltipExpanded : text).trim().split(/\s+/).length;
                    setTimeout(function(el) {
                        if (el._cancelled) return;
                        el.classList.add('fade-out');
                        setTimeout(function() {
                            if (el._cancelled) { el.remove(); return; }
                            el.style.visibility = 'hidden';
                            activePillCount--;
                            if (activePillCount === 0) {
                                setTimeout(function() {
                                    if (activePillCount === 0) {
                                        tooltipStack.innerHTML = '';
                                        tooltipStack.style.height = '';
                                        nextSlotTop = 0;
                                    }
                                }, 100);
                            }
                        }, 400);
                    }.bind(null, item), wordCount * 1500);
                }, delay);
            }

            var shakeTarget = e.target.closest('[data-shake]');
            if (shakeTarget) {
                nameIsUpper = !nameIsUpper;
                var newNames = nameIsUpper
                    ? ['TOBIAS\u00a0', 'LEVIN']
                    : ['Tobias\u00a0', 'Levin'];
                typeEffect(nameSpans[0], newNames[0], function() {
                    typeEffect(nameSpans[1], newNames[1], function() {});
                });
            }

            var swapTarget = e.target.closest('[data-swap]');
            if (swapTarget && !swapTarget._swapping && swapTarget.dataset.swap) {
                swapTarget._swapping = true;
                var swapText = swapTarget.dataset.swap;
                swapTarget.removeAttribute('data-swap');
                typeEffect(swapTarget, swapText, function() {
                    swapTarget._swapping = false;
                    var idx = swapTarget._swapQueue.indexOf(swapText);
                    if (idx < swapTarget._swapQueue.length - 1) {
                        void swapTarget.offsetWidth;
                        swapTarget.dataset.swap = swapTarget._swapQueue[idx + 1];
                    }
                });
            }
        });

        // Live Copenhagen time
        var locationTime = document.getElementById('location-time');
        function updateTime() {
            locationTime.textContent = new Date().toLocaleTimeString('en-GB', {
                timeZone: 'Europe/Copenhagen',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
