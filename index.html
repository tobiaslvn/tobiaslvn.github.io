<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Levin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            padding: 60px;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        @keyframes fade-in-grey {
            to { opacity: 0.4; }
        }

        .word {
            display: inline;
            opacity: 0;
            animation: fade-in 0.45s ease forwards;
        }

        .word.grey {
            animation: fade-in-grey 0.45s ease forwards;
        }

        .plantin {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.25em;
        }

        #name-line {
            display: block;
            font-weight: 400;
            font-size: 24px;
            margin-bottom: 6px;
            white-space: nowrap;
        }

        #subtitle {
            display: block;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #location {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
            color: #999;
            position: fixed;
            bottom: 60px;
            left: 60px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            animation: live-pulse 2s ease-out infinite;
        }

        @keyframes live-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
            70%  { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #prose-container {
            font-size: 24px;
            line-height: 1.6;
        }

        #prose-container p {
            margin-bottom: 1em;
        }

        #prose-container p:last-child {
            margin-bottom: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Tooltip stack */
        #tooltip-stack {
            margin-top: 3em;
            position: relative;
        }

        .tooltip-item {
            position: absolute;
            left: 0;
            display: inline-block;
            max-width: calc(100vw - 120px);
            font-size: 24px;
            line-height: 1.6;
            color: #000;
            background: rgba(235, 234, 230, 0.6);
            border-radius: 5px;
            padding: 0 5px;
            opacity: 0;
            animation: tooltip-pop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes tooltip-pop {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes tooltip-fade-out {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(10px); }
        }

        .tooltip-item.fade-out {
            animation: tooltip-fade-out 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        [data-swap] {
            cursor: pointer;
            background: linear-gradient(rgba(210, 203, 195, 0.6), rgba(210, 203, 195, 0.6)) no-repeat left 72%;
            background-size: 0% 1.1em;
            border-radius: 2px;
            padding-right: 3px;
            margin-right: -3px;
            animation: highlight-sweep 0.4s ease forwards;
        }

        @keyframes highlight-sweep {
            to { background-size: 100% 1.1em; }
        }

        .typing { position: relative; }
        .typing::after {
            content: '|';
            position: absolute;
            left: 100%;
            animation: blink 0.6s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .tooltip-count {
            display: inline-block;
            vertical-align: super;
            font-size: 10px;
            line-height: 1;
            color: #aaa;
            margin-left: 1px;
        }

        .tooltip-word {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: solid;
            text-underline-offset: 4px;
            text-decoration-thickness: 2px;
        }

@media (max-width: 768px) {
            body { padding: 30px; }
            #name-line { margin-bottom: 4px; }
            #subtitle { margin-bottom: 6px; }
            #prose-container { margin-top: 48px; }
            #location { bottom: 30px; left: 30px; }
            .tooltip-item {
                max-width: calc(100vw - 60px);
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="name-line"></div>
    <div id="subtitle"></div>
    <div id="location">
        <span class="live-dot"></span>
        <span>Copenhagen</span>
        <span id="location-time" style="margin-left:4px;"></span>
    </div>
    <div id="prose-container"></div>
    <div id="tooltip-stack"></div>
    <div id="agentation-root"></div>
    <script type="module" src="/src/agentation-widget.jsx"></script>

    <script>
        var emailHref = 'mai' + 'lto:' + 'more' + '@' + 'tobiaslevin.com';

        var nameWords = ['Tobias', 'Levin'];

        var subtitleWords = ['Living', 'in', 'Copenhagen,', 'but', 'often', 'travelling.'];

        var paragraphs = [
            [
                { text: "I'm" },
                { text: 'a' },
                { text: 'generalist designer', swap: 'jack of all trades' },
                { text: ',', noSpace: true },
                { text: 'focused' },
                { text: 'on' },
                { text: 'details', swap: 'tactility', swap2: 'clarity' },
                { text: '.', noSpace: true },
            ],
            [
                { text: 'I' },
                { text: 'co-founded', tooltipPart: 'co', remainder: '-founded', tooltip: '2017~ Nikolaj Honoré and I founded Anyone, later joined by Noel Heath.', tooltip2: '2023~ I continued it solo.' },
                { text: 'Anyone,', href: 'https://anyoneworldwide.com', tooltip: 'We work with artists, brands, and designers redefining what cards can be.', tooltip2: "We've expanded into leather accessories and home goods.", tooltip3: 'We host pop-ups around the world.' },
                { text: 'a' },
                { text: 'playing' },
                { text: 'card' },
                { text: 'brand' },
                { text: 'built' },
                { text: 'around' },
                { text: 'cardistry.', tooltip: 'Think shuffling on peptides.', tooltip2: 'Springs, cuts, fans, chin-extensions.' },
            ],
            [
                { text: 'I' },
                { text: 'studied', tooltip: 'At Scandinavian Academy of Fashion Design.' },
                { text: 'fashion,' },
                { text: 'now' },
                { text: 'working' },
                { text: 'on' },
                { text: 'namesake' },
                { text: 'label.' },
            ],
            [
                { text: 'Email', href: emailHref, grey: true },
                { text: '\u00a0\u00a0\u00a0', grey: true },
                { text: 'Instagram', href: 'https://instagram.com/tobiaslvn', grey: true },
            ],
        ];

        var delay = 0;
        var step = 40;

        function makeWord(text, grey, extraClass) {
            var span = document.createElement('span');
            span.className = 'word' + (grey ? ' grey' : '') + (extraClass ? ' ' + extraClass : '');
            span.style.animationDelay = delay + 'ms';
            delay += step;
            span.textContent = text;
            return span;
        }

        // Name
        var nameLine = document.getElementById('name-line');
        nameWords.forEach(function(word, i) {
            nameLine.appendChild(makeWord(word + (i < nameWords.length - 1 ? '\u00a0' : ''), false));
        });

        // Subtitle (grey)
        var subtitleEl = document.getElementById('subtitle');
        subtitleWords.forEach(function(word, i) {
            var span = makeWord(word, true, word === 'travelling.' ? 'plantin' : '');
            if (word === 'travelling.') {
                span._swapQueue = ['in Tokyo.'];
                span.addEventListener('animationend', function() {
                    this.style.opacity = '0.4';
                    this.dataset.swap = this._swapQueue[0];
                }, { once: true });
            }
            subtitleEl.appendChild(span);
            if (i < subtitleWords.length - 1) subtitleEl.appendChild(document.createTextNode(' '));
        });

        // Prose paragraphs
        var swapSpans = [];
        var container = document.getElementById('prose-container');
        paragraphs.forEach(function(tokens) {
            var p = document.createElement('p');
            tokens.forEach(function(token, i) {
                var span = document.createElement('span');
                span.className = 'word' + (token.grey ? ' grey' : '');
                span.style.animationDelay = delay + 'ms';
                delay += step;

                if (token.tooltipPart) {
                    var inner = document.createElement('span');
                    inner.dataset.tooltip = token.tooltip;
                    if (token.tooltip2) inner.dataset.tooltip2 = token.tooltip2;
                    inner.classList.add('tooltip-word');
                    inner.textContent = token.tooltipPart;
                    var ctr = document.createElement('span');
                    ctr.className = 'tooltip-count';
                    var total = 1 + (token.tooltip2 ? 1 : 0);
                    ctr.textContent = total;
                    ctr.dataset.total = total;
                    inner.appendChild(ctr);
                    inner._tooltipCounter = ctr;
                    span.appendChild(inner);
                    span.appendChild(document.createTextNode(token.remainder));
                } else if (token.tooltip) {
                    span.dataset.tooltip = token.tooltip;
                    if (token.tooltip2) span.dataset.tooltip2 = token.tooltip2;
                    if (token.tooltip3) span.dataset.tooltip3 = token.tooltip3;
                    span.classList.add('tooltip-word');
                    span.textContent = token.text;
                    var ctr = document.createElement('span');
                    ctr.className = 'tooltip-count';
                    var total = 1 + (token.tooltip2 ? 1 : 0) + (token.tooltip3 ? 1 : 0);
                    ctr.textContent = total;
                    ctr.dataset.total = total;
                    span.appendChild(ctr);
                    span._tooltipCounter = ctr;
                } else if (token.swap) {
                    span.textContent = token.text;
                    span._swapQueue = [token.swap];
                    if (token.swap2) span._swapQueue.push(token.swap2);
                    span.addEventListener('animationend', function() {
                        this.style.opacity = '1';
                        this._fadeInDone = true;
                        if (this._activateHighlight) this._activateHighlight();
                    }, { once: true });
                    swapSpans.push(span);
                } else if (token.href) {
                    var a = document.createElement('a');
                    a.href = token.href;
                    if (token.href.indexOf('mailto') === -1) a.target = '_blank';
                    a.textContent = token.text;
                    span.appendChild(a);
                } else {
                    span.textContent = token.text;
                }

                p.appendChild(span);
                if (i < tokens.length - 1 && !tokens[i + 1].noSpace) p.appendChild(document.createTextNode(' '));
            });
            container.appendChild(p);
        });

        // Chained highlight sweeps for swap words
        function activateSwapHighlight(span) {
            span.style.opacity = '1';
            span.dataset.swap = span._swapQueue[0];
            span.addEventListener('animationend', function() {
                var next = swapSpans[swapSpans.indexOf(span) + 1];
                if (next) {
                    if (next._fadeInDone) { activateSwapHighlight(next); }
                    else { next._activateHighlight = function() { activateSwapHighlight(next); }; }
                }
            }, { once: true });
        }
        if (swapSpans[0]) {
            if (swapSpans[0]._fadeInDone) { activateSwapHighlight(swapSpans[0]); }
            else { swapSpans[0]._activateHighlight = function() { activateSwapHighlight(swapSpans[0]); }; }
        }

        // Tooltip stack
        var tooltipStack = document.getElementById('tooltip-stack');
        var clickCounts = new Map();
        var activePillCount = 0;
        var nextSlotTop = 0;
        var PILL_GAP = 8;

        var typeTimer = null;
        function typeEffect(el, target, onComplete) {
            if (typeTimer) clearTimeout(typeTimer);
            var current = el.textContent;
            var deleteSteps = [];
            for (var i = current.length - 1; i >= 0; i--) deleteSteps.push(current.slice(0, i));
            var typeSteps = [];
            for (var j = 1; j <= target.length; j++) typeSteps.push(target.slice(0, j));
            el.classList.add('typing');
            var stepIndex = 0;
            function next() {
                if (stepIndex < deleteSteps.length) {
                    el.textContent = deleteSteps[stepIndex++];
                    typeTimer = setTimeout(next, 50);
                } else if (stepIndex === deleteSteps.length) {
                    stepIndex++;
                    typeTimer = setTimeout(next, 180);
                } else {
                    var typeIndex = stepIndex - deleteSteps.length - 1;
                    if (typeIndex < typeSteps.length) {
                        el.textContent = typeSteps[typeIndex];
                        stepIndex++;
                        typeTimer = setTimeout(next, 50);
                    } else {
                        el.classList.remove('typing');
                        if (onComplete) onComplete();
                    }
                }
            }
            next();
        }

        document.addEventListener('click', function(e) {
            var tooltipTarget = e.target.closest('[data-tooltip]');
            if (tooltipTarget) {
                e.preventDefault();
                var count = clickCounts.get(tooltipTarget) || 0;
                var text = count === 0
                    ? tooltipTarget.dataset.tooltip
                    : count === 1
                        ? (tooltipTarget.dataset.tooltip2 || null)
                        : count === 2
                            ? (tooltipTarget.dataset.tooltip3 || null)
                            : null;
                if (!text) return;
                var newCount = count + 1;
                clickCounts.set(tooltipTarget, newCount);
                var hasMore = newCount === 1
                    ? !!tooltipTarget.dataset.tooltip2
                    : newCount === 2
                        ? !!tooltipTarget.dataset.tooltip3
                        : false;
                if (!hasMore) {
                    tooltipTarget.classList.remove('tooltip-word');
                    if (tooltipTarget._tooltipCounter) tooltipTarget._tooltipCounter.remove();
                } else if (tooltipTarget._tooltipCounter) {
                    tooltipTarget._tooltipCounter.textContent = parseInt(tooltipTarget._tooltipCounter.dataset.total) - newCount;
                }
                activePillCount++;

                var item = document.createElement('div');
                item.className = 'tooltip-item';
                item.textContent = text;
                item.style.top = nextSlotTop + 'px';
                tooltipStack.appendChild(item);

                requestAnimationFrame(function() {
                    nextSlotTop += item.offsetHeight + PILL_GAP;
                    tooltipStack.style.height = nextSlotTop + 'px';
                });

                var wordCount = text.trim().split(/\s+/).length;
                setTimeout(function(el) {
                    el.classList.add('fade-out');
                    setTimeout(function() {
                        el.style.visibility = 'hidden';
                        activePillCount--;
                        if (activePillCount === 0) {
                            setTimeout(function() {
                                if (activePillCount === 0) {
                                    tooltipStack.innerHTML = '';
                                    tooltipStack.style.height = '';
                                    nextSlotTop = 0;
                                }
                            }, 100);
                        }
                    }, 250);
                }.bind(null, item), wordCount * 700);
            }

            var swapTarget = e.target.closest('[data-swap]');
            if (swapTarget && !swapTarget._swapping) {
                swapTarget._swapping = true;
                var swapText = swapTarget.dataset.swap;
                swapTarget.removeAttribute('data-swap');
                typeEffect(swapTarget, swapText, function() {
                    swapTarget._swapping = false;
                    var idx = swapTarget._swapQueue.indexOf(swapText);
                    if (idx < swapTarget._swapQueue.length - 1) {
                        void swapTarget.offsetWidth;
                        swapTarget.dataset.swap = swapTarget._swapQueue[idx + 1];
                    }
                });
            }
        });

        // Live Copenhagen time
        var locationTime = document.getElementById('location-time');
        function updateTime() {
            locationTime.textContent = new Date().toLocaleTimeString('en-GB', {
                timeZone: 'Europe/Copenhagen',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
