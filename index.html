<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobias Levin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='50' y1='15' x2='50' y2='85' stroke='black' stroke-width='12' stroke-linecap='round'/><line x1='15' y1='50' x2='85' y2='50' stroke='black' stroke-width='12' stroke-linecap='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fff;
            color: #101820;
            min-height: 100vh;
            padding: 60px;
            display: flex;
            justify-content: center;
        }

        #main-content {
            width: 100%;
            max-width: 560px;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        @keyframes fade-in-grey {
            to { opacity: 1; }
        }

        .word {
            display: inline;
            opacity: 0;
            animation: fade-in 0.45s ease forwards;
        }

        .word.grey {
            color: #d9d9d6;
            animation: fade-in-grey 0.45s ease forwards;
        }

#name-line {
            display: block;
            font-weight: 400;
            font-size: 16px;
            white-space: nowrap;
        }

        #subtitle {
            display: block;
            font-size: 16px;
            margin-bottom: 20px;
        }

        #location {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 16px;
            color: #d9d9d6;
            position: fixed;
            bottom: 60px;
            left: max(60px, calc(50% - 280px));
            opacity: 0;
            animation: fade-in 0.45s ease forwards;
            animation-delay: 1800ms;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            animation: live-pulse 2s ease-out infinite;
        }

        @keyframes live-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
            70%  { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #prose-container {
            font-size: 16px;
            line-height: 1.5;
        }

        #subtitle {
            line-height: 1.5;
        }

        #prose-container p {
            margin-bottom: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .word.grey a:hover {
            color: #a8a8a5;
        }

        /* Tooltip stack */
        #tooltip-stack {
            margin-top: 3em;
            position: relative;
        }

        .tooltip-item {
            position: absolute;
            left: 0;
            max-width: calc(100vw - 120px);
            font-size: 16px;
            line-height: 2;
            opacity: 0;
            animation: tooltip-pop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tooltip-item-inner {
            display: inline;
            background: #f5f5f5;
            color: #101820;
            border-radius: 5px;
            padding: 10px 16px;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        @keyframes tooltip-pop {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes tooltip-fade-out {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-10px); }
        }

        .tooltip-item.fade-out {
            animation: tooltip-fade-out 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        [data-swap] {
            cursor: pointer;
            background: linear-gradient(rgba(190, 215, 255, 0.6), rgba(190, 215, 255, 0.6)) no-repeat left 72%;
            background-size: 0% 1.1em;
            border-radius: 2px;
            padding-right: 3px;
            margin-right: -3px;
            animation: highlight-sweep 0.4s ease forwards !important;
        }

        @keyframes highlight-sweep {
            to { background-size: 100% 1.1em; }
        }

        .typing { position: relative; }
        .typing::after {
            content: '|';
            position: absolute;
            left: 100%;
            animation: blink 0.6s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .tooltip-word {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: solid;
            text-underline-offset: 4px;
            text-decoration-thickness: 2px;
            text-decoration-color: transparent;
            transition: text-decoration-color 0.3s ease;
        }

        .tooltip-word.underlined {
            text-decoration-color: #d9d9d6;
        }

        #expand-btn {
            display: inline-block;
            background: #f0f0ee;
            border: none;
            padding: 0 5px;
            border-radius: 999px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.4;
            vertical-align: middle;
            cursor: pointer;
            color: #101820;
            opacity: 0;
            animation: fade-in-grey 0.45s ease forwards;
        }

        #expand-btn:hover { opacity: 1 !important; }

        @media (max-width: 768px) {
            body { padding: 30px; }
            #subtitle { margin-bottom: 6px; }
            #location { bottom: 30px; left: 30px; }
            .tooltip-item {
                max-width: calc(100vw - 60px);
                font-size: 16px;
                line-height: 1.55;
            }
            .tooltip-item-inner {
                padding: 2px 5px;
            }
        }
    </style>
</head>
<body>

    <div id="main-content">
        <div id="name-line"></div>
        <div id="subtitle"></div>
        <div id="prose-container"></div>
        <div id="tooltip-stack"></div>
    </div>
    <div id="location">
        <span class="live-dot"></span>
        <span id="location-name">Copenhagen</span>
        <span id="location-time" style="margin-left:4px;"></span>
    </div>

    <script>
        var emailHref = 'mai' + 'lto:' + 'more' + '@' + 'tobiaslevin.com';

        var nameWords = ['Tobias', 'Levin'];

        var subtitleWords = ['Danish,', '1995~'];

        var paragraphs = [
            [
                { text: 'Based' },
                { text: 'in' },
                { text: 'Copenhagen,' },
                { text: 'but' },
                { text: 'often' },
                { text: 'travelling.' },
                { text: '\n', noSpace: true },
                { text: "I'm" },
                { text: 'a' },
                { text: 'generalist designer', swap: 'jack of all trades' },
                { text: ',', noSpace: true },
                { text: 'focused' },
                { text: 'on' },
                { text: 'details', swap: 'niceties' },
                { text: '.', noSpace: true },
            ],
            [
                { text: 'I' },
                { text: 'co-founded', tooltipPart: 'co', remainder: '-founded', tooltip: '2017~ Nikolaj Honoré and I started the company, later joined by Noel Heath.\n2022~ I continued it solo.' },
                { text: 'Anyone,', href: 'https://anyoneworldwide.com', tooltip: 'We work with artists, brands, and designers redefining what playing cards can be.' },
                { text: 'a' },
                { text: 'playing' },
                { text: 'card' },
                { text: 'brand' },
                { text: 'built' },
                { text: 'around' },
                { text: 'cardistry.', tooltip: 'Think card shuffles on peptides.' },
            ],
            [
                { text: 'Email', href: emailHref, grey: true },
                { text: '\u00a0\u00a0\u00a0', grey: true },
                { text: 'Instagram', href: 'https://instagram.com/tobiaslvn', grey: true },
                { text: '\u00a0\u00a0\u00a0', grey: true },
                // { text: 'Writing', href: '/writing/', grey: true },
            ],
        ];

        var TOOLTIP_COLORS = ['#f5f5f5', '#f5f5f5', '#f5f5f5', '#f5f5f5'];
        var tooltipColorIdx = 0;

        var delay = 0;
        var step = 40;

        function makeWord(text, grey, extraClass) {
            var span = document.createElement('span');
            span.className = 'word' + (grey ? ' grey' : '') + (extraClass ? ' ' + extraClass : '');
            span.style.animationDelay = delay + 'ms';
            delay += step;
            span.textContent = text;
            return span;
        }

        // Name
        var nameLine = document.getElementById('name-line');
        nameWords.forEach(function(word, i) {
            nameLine.appendChild(makeWord(word + (i < nameWords.length - 1 ? '\u00a0' : ''), false));
        });

        var swapSpans = [];

        // Subtitle (grey)
        var subtitleEl = document.getElementById('subtitle');
        subtitleWords.forEach(function(word, i) {
            var span = makeWord(word, true);
            subtitleEl.appendChild(span);
            if (i < subtitleWords.length - 1) subtitleEl.appendChild(document.createTextNode(' '));
        });

        // Prose paragraphs
        var container = document.getElementById('prose-container');

        function renderParagraph(tokens) {
            var p = document.createElement('p');
            tokens.forEach(function(token, i) {
                if (token.text === '\n') {
                    var br = document.createElement('span');
                    br.style.display = 'block';
                    br.style.height = '12px';
                    p.appendChild(br);
                    return;
                }
                var span = document.createElement('span');
                span.className = 'word' + (token.grey ? ' grey' : '');
                span.style.animationDelay = delay + 'ms';
                delay += step;

                if (token.tooltipPart) {
                    var inner = document.createElement('span');
                    inner.dataset.tooltip = token.tooltip;
                    inner.classList.add('tooltip-word', 'underlined');
                    inner.textContent = token.tooltipPart;
                    var tipColor = TOOLTIP_COLORS[tooltipColorIdx++ % TOOLTIP_COLORS.length];
                    inner._tooltipColor = tipColor;
                    span.appendChild(inner);
                    span.appendChild(document.createTextNode(token.remainder));
                } else if (token.tooltip) {
                    span.dataset.tooltip = token.tooltip;
                    if (token.tooltipClickWord) span._tooltipClickWord = token.tooltipClickWord;
                    if (token.tooltipExpanded) span._tooltipExpanded = token.tooltipExpanded;
                    span.classList.add('tooltip-word', 'underlined');
                    span.textContent = token.text;
                    var tipColor = TOOLTIP_COLORS[tooltipColorIdx++ % TOOLTIP_COLORS.length];
                    span._tooltipColor = tipColor;
                } else if (token.swap) {
                    span.textContent = token.text;
                    span._swapQueue = [token.swap];
                    if (token.swap2) span._swapQueue.push(token.swap2);
                    span.addEventListener('animationend', function() {
                        this.style.opacity = '1';
                        this._fadeInDone = true;
                        if (this._activateHighlight) this._activateHighlight();
                    }, { once: true });
                    swapSpans.push(span);
                } else if (token.href) {
                    var a = document.createElement('a');
                    a.href = token.href;
                    if (token.href.indexOf('mailto') === -1 && token.href.indexOf('/') !== 0) a.target = '_blank';
                    a.textContent = token.text;
                    span.appendChild(a);
                } else {
                    span.textContent = token.text;
                }

                p.appendChild(span);
                if (i < tokens.length - 1 && !tokens[i + 1].noSpace) p.appendChild(document.createTextNode(' '));
            });
            return p;
        }

        // Always-visible first paragraph
        var firstP = renderParagraph(paragraphs[0]);
        container.appendChild(firstP);

        // Expand button — inline at end of current paragraph
        var expandBtn = document.createElement('button');
        expandBtn.id = 'expand-btn';
        expandBtn.textContent = '+';
        expandBtn.style.animationDelay = delay + 'ms';
        delay += step;
        firstP.appendChild(document.createTextNode(' '));
        firstP.appendChild(expandBtn);

        // Always-visible last paragraph (Email / Instagram)
        var emailP = renderParagraph(paragraphs[2]);
        emailP.style.marginTop = '50px';
        container.appendChild(emailP);

        var expandableParagraphs = [paragraphs[1]];
        var expandIndex = 0;

        expandBtn.addEventListener('click', function() {
            if (expandIndex >= expandableParagraphs.length) return;

            // Swift fade out
            expandBtn.style.transition = 'opacity 0.15s ease';
            expandBtn.style.opacity = '0';

            setTimeout(function() {
                // Detach + from old paragraph
                var prev = expandBtn.previousSibling;
                if (prev && prev.nodeType === 3) prev.remove();
                expandBtn.remove();

                // Render next paragraph with fresh animation delays
                delay = 0;
                var tokens = expandableParagraphs[expandIndex];
                var p = renderParagraph(tokens);
                p.style.overflow = 'hidden';
                p.style.maxHeight = '0';
                p.style.marginTop = '0';
                container.insertBefore(p, emailP);
                void p.offsetWidth;
                p.style.transition = 'max-height 0.5s ease, margin-top 0.4s ease';
                p.style.maxHeight = '200px';
                p.style.marginTop = '12px';
                expandIndex++;


                var isLastExpand = expandIndex >= expandableParagraphs.length;
                if (!isLastExpand) {
                    // Pause until sentence is done, then fade + back in
                    var sentenceDone = (tokens.length - 1) * step + 450 + 350;
                    setTimeout(function() {
                        expandBtn.style.animation = 'none';
                        expandBtn.style.transition = 'none';
                        expandBtn.style.opacity = '0';
                        p.appendChild(document.createTextNode(' '));
                        p.appendChild(expandBtn);
                        void expandBtn.offsetWidth;
                        expandBtn.style.transition = 'opacity 0.3s ease';
                        expandBtn.style.opacity = '1';
                    }, sentenceDone);
                }
            }, 150);
        });


        // Chained highlight sweeps for swap words
        function activateSwapHighlight(span) {
            span.style.opacity = span.classList.contains('grey') ? '0.4' : '1';
            span.dataset.swap = span._highlightOnly ? '' : span._swapQueue[0];
            span.addEventListener('animationend', function() {
                var next = swapSpans[swapSpans.indexOf(span) + 1];
                if (next) {
                    if (next._fadeInDone) { activateSwapHighlight(next); }
                    else { next._activateHighlight = function() { activateSwapHighlight(next); }; }
                }
            }, { once: true });
        }
        if (swapSpans[0]) {
            setTimeout(function() {
                activateSwapHighlight(swapSpans[0]);
            }, delay + 600);
        }

        // Tooltip stack
        var tooltipStack = document.getElementById('tooltip-stack');
        var activePillCount = 0;
        var nextSlotTop = 0;

        var typeTimer = null;
        function typeEffect(el, target, onComplete) {
            if (typeTimer) clearTimeout(typeTimer);
            var current = el.textContent;
            var deleteSteps = [];
            for (var i = current.length - 1; i >= 0; i--) deleteSteps.push(current.slice(0, i));
            var typeSteps = [];
            for (var j = 1; j <= target.length; j++) typeSteps.push(target.slice(0, j));
            el.classList.add('typing');
            var stepIndex = 0;
            function next() {
                if (stepIndex < deleteSteps.length) {
                    el.textContent = deleteSteps[stepIndex++];
                    typeTimer = setTimeout(next, 50);
                } else if (stepIndex === deleteSteps.length) {
                    stepIndex++;
                    typeTimer = setTimeout(next, 180);
                } else {
                    var typeIndex = stepIndex - deleteSteps.length - 1;
                    if (typeIndex < typeSteps.length) {
                        el.textContent = typeSteps[typeIndex];
                        stepIndex++;
                        typeTimer = setTimeout(next, 50);
                    } else {
                        el.classList.remove('typing');
                        if (onComplete) onComplete();
                    }
                }
            }
            next();
        }

        document.addEventListener('click', function(e) {
            var tooltipTarget = e.target.closest('[data-tooltip]');
            if (tooltipTarget) {
                e.preventDefault();
                var text = tooltipTarget.dataset.tooltip;

                // Cancel and fade out any existing pills
                var hadExisting = tooltipStack.querySelectorAll('.tooltip-item').length > 0;
                tooltipStack.querySelectorAll('.tooltip-item').forEach(function(p) {
                    p._cancelled = true;
                    p.classList.add('fade-out');
                });
                activePillCount = 0;
                nextSlotTop = 0;

                var delay = hadExisting ? 400 : 0;
                setTimeout(function() {
                    tooltipStack.innerHTML = '';
                    activePillCount++;
                    var item = document.createElement('div');
                    item.className = 'tooltip-item';
                    item.style.top = '0px';
                    var inner = document.createElement('span');
                    inner.className = 'tooltip-item-inner';
                    if (tooltipTarget._tooltipClickWord && text.includes(tooltipTarget._tooltipClickWord)) {
                        var parts = text.split(tooltipTarget._tooltipClickWord);
                        inner.appendChild(document.createTextNode(parts[0]));
                        var expandBtn = document.createElement('span');
                        expandBtn.textContent = tooltipTarget._tooltipClickWord;
                        expandBtn.style.cssText = 'cursor:pointer;border-radius:2px;padding:0 3px;margin:0 -1px;background:linear-gradient(rgba(190,215,255,0.6),rgba(190,215,255,0.6)) no-repeat left 72%;background-size:0% 1.1em;animation:highlight-sweep 0.4s ease forwards;animation-delay:500ms;';
                        expandBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            expandBtn.style.background = 'none';
                            typeEffect(expandBtn, tooltipTarget._tooltipExpanded);
                        });
                        inner.appendChild(expandBtn);
                        if (parts[1]) inner.appendChild(document.createTextNode(parts[1]));
                    } else {
                        text.split('\n').forEach(function(line, i, arr) {
                            inner.appendChild(document.createTextNode(line));
                            if (i < arr.length - 1) inner.appendChild(document.createElement('br'));
                        });
                    }
                    var cardColor = tooltipTarget._tooltipColor;
                    if (cardColor) {
                        inner.style.background = cardColor;
                        var brightness = parseInt(cardColor.slice(1,3),16);
                        inner.style.color = brightness > 150 ? '#101820' : '#fff';
                    }
                    item.appendChild(inner);
                    tooltipStack.appendChild(item);

                    requestAnimationFrame(function() {
                        nextSlotTop = item.offsetHeight;
                        tooltipStack.style.height = nextSlotTop + 'px';
                    });

                    var wordCount = (tooltipTarget._tooltipExpanded ? 'At ' + tooltipTarget._tooltipExpanded : text).trim().split(/\s+/).length;
                    setTimeout(function(el) {
                        if (el._cancelled) return;
                        el.classList.add('fade-out');
                        setTimeout(function() {
                            if (el._cancelled) { el.remove(); return; }
                            el.style.visibility = 'hidden';
                            activePillCount--;
                            if (activePillCount === 0) {
                                setTimeout(function() {
                                    if (activePillCount === 0) {
                                        tooltipStack.innerHTML = '';
                                        tooltipStack.style.height = '';
                                        nextSlotTop = 0;
                                    }
                                }, 100);
                            }
                        }, 400);
                    }.bind(null, item), wordCount * 1500);
                }, delay);
            }

            var swapTarget = e.target.closest('[data-swap]');
            if (swapTarget && !swapTarget._swapping && swapTarget.dataset.swap) {
                swapTarget._swapping = true;
                var swapText = swapTarget.dataset.swap;
                swapTarget.removeAttribute('data-swap');
                typeEffect(swapTarget, swapText, function() {
                    swapTarget._swapping = false;
                    var idx = swapTarget._swapQueue.indexOf(swapText);
                    if (idx < swapTarget._swapQueue.length - 1) {
                        void swapTarget.offsetWidth;
                        swapTarget.dataset.swap = swapTarget._swapQueue[idx + 1];
                    }
                });
            }
        });

        // Location + timezone from API
        var timezoneMap = {
            'Copenhagen': 'Europe/Copenhagen',
            'Paris': 'Europe/Paris',
            'Los Angeles': 'America/Los_Angeles',
            'New York': 'America/New_York',
            'Tokyo': 'Asia/Tokyo'
        };
        var currentTimezone = 'Europe/Copenhagen';
        fetch('/api/config').then(function(r) { return r.json(); }).then(function(d) {
            var today = new Date().toISOString().split('T')[0];
            var travel = [];
            try { travel = JSON.parse(d.travel || '[]'); } catch(e) {}
            var current = travel.find(function(t) { return today >= t.start && today <= t.end; });
            var locationName = current ? current.city : (d.location || 'Copenhagen');
            document.getElementById('location-name').textContent = locationName;
            currentTimezone = timezoneMap[locationName] || 'Europe/Copenhagen';
            updateTime();
        });

        // Live local time
        var locationTime = document.getElementById('location-time');
        function updateTime() {
            locationTime.textContent = new Date().toLocaleTimeString('en-GB', {
                timeZone: currentTimezone,
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
