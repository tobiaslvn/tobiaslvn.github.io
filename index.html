<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tobias Levin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            cursor: default;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* ── CARD ── */
        .card {
            position: fixed;
            top: 50px;
            left: 50px;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.55;
            letter-spacing: normal;
        }

        .card-name {
            font-weight: 500;
            margin-bottom: 0.9em;
        }

        .card p { color: #000; }
        .card a { color: #000; }

        .card .contact {
            margin-top: 0.9em;
        }

        .card .contact a {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .card .ig {
            margin-top: 0.3em;
        }

        .card .ig a {
            color: #999;
            text-decoration: none;
        }

        /* ── ZOOM ── */
        .lens {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.35s ease;
            background: #fff;
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 70%);
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
            aspect-ratio: 1 / 1;
        }

        .lens.visible {
            opacity: 1;
        }

        .lens-card {
            position: absolute;
            font-family: 'Instrument Sans', sans-serif;
            font-weight: 400;
            line-height: 1.55;
            letter-spacing: normal;
            color: #000;
            white-space: nowrap;
            will-change: transform, filter;
        }

        .lens-card .card-name {
            font-weight: 500;
            margin-bottom: 0.9em;
        }

        .lens-card a { color: #000; }

        .lens-card .contact {
            margin-top: 0.9em;
        }

        .lens-card .contact a {
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .lens-card .ig {
            margin-top: 0.3em;
        }

        .lens-card .ig a {
            color: #999;
            text-decoration: none;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .card {
                top: 35px;
                left: 30px;
                font-size: 13px;
            }
            .lens {
                width: min(85vw, 400px);
                height: min(85vw, 400px);
            }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div class="card-name">TOBIAS LEVIN</div>
        <p>Designer, focused on details.</p>
        <p>Based in Copenhagen, often in Tokyo.</p>
        <div class="contact">
            <p><a href="mailto:More@tobiaslevin.com">Email me</a> for consulting services.</p>
        </div>
        <div class="ig">
            <a href="https://instagram.com/tobiaslvn" target="_blank">Instagram</a>
        </div>
    </div>

    <div class="lens" id="lens">
        <div class="lens-card" id="lensCard">
            <div class="card-name">TOBIAS LEVIN</div>
            <p>Designer, focused on details.</p>
            <p>Based in Copenhagen, often in Tokyo.</p>
            <div class="contact">
                <p><a href="mailto:More@tobiaslevin.com">Email me</a> for consulting services.</p>
            </div>
            <div class="ig">
                <a href="https://instagram.com/tobiaslvn">Instagram</a>
            </div>
        </div>
    </div>

    <script>
        const lens = document.getElementById('lens');
        const lensCard = document.getElementById('lensCard');
        const card = document.getElementById('card');
        const zoom = 12;
        const proximityPadding = 40;

        let mouseX = 0, mouseY = 0;
        let smoothX = 0, smoothY = 0;
        let prevSmoothX = 0, prevSmoothY = 0;
        let active = false;
        let isMobile = false;
        let gyroActive = false;
        let gyroX = 0, gyroY = 0;
        let baseGamma = null, baseBeta = null;

        function lerp(a, b, t) { return a + (b - a) * t; }

        function tick() {
            if (!active) return;

            smoothX = lerp(smoothX, mouseX, 0.1);
            smoothY = lerp(smoothY, mouseY, 0.1);

            const src = card.getBoundingClientRect();
            const lensW = lens.offsetWidth;
            const lensH = lens.offsetHeight;

            const baseFontSize = parseFloat(getComputedStyle(card).fontSize);
            lensCard.style.fontSize = (baseFontSize * zoom) + 'px';

            const relX = smoothX - src.left;
            const relY = smoothY - src.top;
            const scaledX = relX * zoom;
            const scaledY = relY * zoom;

            const tx = (lensW / 2) - scaledX;
            const ty = (lensH / 2) - scaledY;

            const vx = (smoothX - prevSmoothX) * zoom;
            const vy = (smoothY - prevSmoothY) * zoom;
            const speed = Math.sqrt(vx * vx + vy * vy);
            const blur = Math.min(speed * 0.15, 18);

            prevSmoothX = smoothX;
            prevSmoothY = smoothY;

            lensCard.style.transform = `translate(${tx}px, ${ty}px)`;
            lensCard.style.filter = blur > 0.5 ? `blur(${blur}px)` : 'none';

            requestAnimationFrame(tick);
        }

        function show(x, y) {
            mouseX = x; mouseY = y;
            if (!active) {
                smoothX = x; smoothY = y;
                prevSmoothX = x; prevSmoothY = y;
                active = true;
                lens.classList.add('visible');
                requestAnimationFrame(tick);
            }
        }

        function hide() {
            active = false;
            lens.classList.remove('visible');
        }

        function isNearCard() {
            const src = card.getBoundingClientRect();
            return (
                mouseX >= src.left - proximityPadding &&
                mouseX <= src.right + proximityPadding &&
                mouseY >= src.top - proximityPadding &&
                mouseY <= src.bottom + proximityPadding
            );
        }

        // ── DESKTOP ──
        document.addEventListener('mousemove', (e) => {
            if (isMobile) return;
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isNearCard()) {
                if (!active) show(e.clientX, e.clientY);
            } else {
                if (active) hide();
            }
        });

        document.addEventListener('mouseleave', () => {
            if (!isMobile) hide();
        });

        // Links (both desktop and mobile)
        document.addEventListener('click', (e) => {
            const els = document.elementsFromPoint(e.clientX, e.clientY);
            for (const el of els) {
                if (el.tagName === 'A' && card.contains(el)) {
                    el.href.startsWith('mailto:') ? window.location.href = el.href : window.open(el.href, '_blank');
                    break;
                }
            }
        });

        // ── MOBILE: GYROSCOPE ──
        function handleOrientation(e) {
            if (!gyroActive) return;

            const gamma = e.gamma || 0; // left/right tilt (-90 to 90)
            const beta = e.beta || 0;   // front/back tilt (-180 to 180)

            // Set baseline on first reading
            if (baseGamma === null) {
                baseGamma = gamma;
                baseBeta = beta;
            }

            // Relative tilt from starting position
            const relGamma = gamma - baseGamma;
            const relBeta = beta - baseBeta;

            // Map tilt to position on the card
            // Sensitivity: ~15 degrees of tilt covers the full card
            const src = card.getBoundingClientRect();
            const cardCenterX = src.left + src.width / 2;
            const cardCenterY = src.top + src.height / 2;

            const sensitivity = 8;
            mouseX = cardCenterX + (relGamma * sensitivity);
            mouseY = cardCenterY + (relBeta * sensitivity);
        }

        function startGyro() {
            gyroActive = true;
            baseGamma = null;
            baseBeta = null;
            const src = card.getBoundingClientRect();
            show(src.left + src.width / 2, src.top + src.height / 2);
        }

        function stopGyro() {
            gyroActive = false;
            hide();
        }

        // Tap to toggle on mobile
        document.addEventListener('touchstart', (e) => {
            isMobile = true;

            if (active) {
                // Check if tapping a link
                const t = e.touches[0];
                const els = document.elementsFromPoint(t.clientX, t.clientY);
                for (const el of els) {
                    if (el.tagName === 'A' && card.contains(el)) {
                        el.href.startsWith('mailto:') ? window.location.href = el.href : window.open(el.href, '_blank');
                        stopGyro();
                        return;
                    }
                }
                stopGyro();
            } else {
                // Request permission on iOS 13+
                if (typeof DeviceOrientationEvent !== 'undefined' &&
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => {
                            if (response === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                startGyro();
                            }
                        })
                        .catch(console.error);
                } else {
                    // Android or older iOS — just start
                    window.addEventListener('deviceorientation', handleOrientation);
                    startGyro();
                }
            }
        }, { passive: true });
    </script>
</body>
</html>
